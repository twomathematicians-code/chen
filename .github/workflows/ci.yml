name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff>=0.1
      - name: Run ruff check
        run: ruff check src tests
      - name: Check formatting
        run: ruff format --check src tests

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + mypy
        run: |
          pip install -e ".[dev]"
      - name: Run mypy
        run: mypy src/chen || true  # non-blocking for now; tighten once stable

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        exclude:
          # Skip macos-3.9 combination — setup-python sometimes fails there.
          - os: macos-latest
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (mock backend only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests (fast only)
        run: |
          pytest -m "not slow and not gpu and not integration" --cov=chen --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-examples:
    name: Test example scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          pip install -e ".[dev]"
      - name: Run Phase 1 example
        run: python examples/run_phase1.py --backend mock
      - name: Run Phase 2 example
        run: python examples/run_phase2.py
      - name: Run Phase 3 example
        run: python examples/run_phase3.py --router logistic
      - name: Run benchmarks example
        run: python examples/run_benchmarks.py --phase 1 || true  # exit code 1 if targets not met

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
