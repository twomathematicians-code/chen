# AlertManager configuration for CHEN.
#
# Replace the webhook URLs and email addresses with your own.

global:
  resolve_timeout: 5m

# Templates for alert notifications.
templates:
  - /etc/alertmanager/templates/*.tmpl

# Routing tree.
route:
  group_by: ['alertname', 'cluster', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 3h
  receiver: 'default'

  # Routes for specific severities.
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 0s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning'
    - match:
        severity: info
      receiver: 'info'

# Notification receivers.
receivers:
  - name: 'default'
    # Slack webhook for all alerts.
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR_WEBHOOK_URL'
        channel: '#chen-alerts'
        send_resolved: true
        title: '{{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}'

  - name: 'critical'
    # Page on-call for critical alerts.
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR_CRITICAL_WEBHOOK'
        channel: '#chen-critical'
        send_resolved: true
    # Also send email.
    email_configs:
      - to: 'oncall@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager@example.com'
        auth_password: 'YOUR_SMTP_PASSWORD'
        send_resolved: true

  - name: 'warning'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR_WEBHOOK_URL'
        channel: '#chen-alerts'
        send_resolved: true

  - name: 'info'
    # Info alerts are only logged — no notification.
    webhook_configs:
      - url: 'http://localhost:9093/log'
        send_resolved: false

# Inhibition rules — suppress lower-severity alerts when a higher one is firing.
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster']
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'cluster']
